<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teguh Model Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:#111827;
position:sticky;
top:0;
}

.logo{
font-size:24px;
font-weight:bold;
color:#22d3ee;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
padding:80px 20px;
text-align:center;
background:linear-gradient(135deg,#0891b2,#2563eb);
}

.hero h1{
font-size:50px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
margin-bottom:25px;
}

.hero button{
padding:14px 30px;
border:none;
border-radius:10px;
background:white;
font-weight:bold;
cursor:pointer;
}

.search{
padding:30px;
text-align:center;
}

.search input{
width:90%;
max-width:600px;
padding:15px;
border-radius:10px;
border:none;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px cyan;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.info{
padding:20px;
}

.info h2{
margin-bottom:10px;
}

.tag{
display:inline-block;
background:#22d3ee;
color:black;
padding:4px 10px;
border-radius:20px;
margin-top:10px;
font-size:14px;
}

.btn{
display:block;
margin-top:15px;
padding:12px;
background:#22d3ee;
text-align:center;
text-decoration:none;
color:black;
font-weight:bold;
border-radius:8px;
}

footer{
text-align:center;
padding:30px;
color:#aaa;
}
</style>
</head>

<body>

<nav>
<div class="logo">📦 Teguh Model Hub</div>

<div>
<a href="#">Home</a>
<a href="#">Models</a>
<a href="#">Trending</a>
<a href="#">About</a>
</div>
</nav>

<section class="hero">
<h1>Share Your Models</h1>
<p>Minecraft • Bus • AI • 3D • Texture Pack</p>
<button onclick="scrollToModels()">Explore</button>
</section>

<section class="search">
<input type="text" id="search" placeholder="Cari model..." onkeyup="filterModels()">
</section>

<section class="grid" id="models">

<div class="card">
<img src="https://picsum.photos/500/300?1">
<div class="info">
<h2>rig komputer</h2>
<p>⭐⭐⭐⭐⭐</p>
<span class="tag">Minecraft</span>
<a class="btn" href="https://drive.google.com/file/d/1peaEW1jxAGr8_ntPrFgreuD48ELAUFBl/view?usp=drivesdk">Download</a>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500/300?2">
<div class="info">
<h2>Rig realme note 80 4G</h2>
<p>⭐⭐⭐⭐☆</p>
<span class="tag">Bus</span>
<a class="btn" href="https://drive.google.com/file/d/1ppI_mlNc1qsRvxn214jQl8yeCtaEnDCV/view?usp=drivesdk">Download</a>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500/300?3">
<div class="info">
<h2>tablet</h2>
<p>⭐⭐⭐⭐⭐</p>
<span class="tag">AI</span>
<a class="btn" href="https://drive.google.com/file/d/19q71WifqMuW3Sj58dU5wHz_Mx9kVFSb2/view?usp=drivesdk">Download</a>
</div>
</div>

</section>

<footer>
© 2026 Teguh Model Hub
</footer>

<script>

function scrollToModels(){
document.getElementById("models").scrollIntoView({
behavior:"smooth"
});
}

function filterModels(){

let input=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let title=card.querySelector("h2").innerText.toLowerCase();

if(title.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

</script>

</body>
</html>
